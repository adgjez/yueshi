name: Android CI

on:
  push:
    branches: [ main, 'trae/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

# 同一分支/PR 的新 push 取消旧的运行，避免重复占用 runner
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile & Assemble Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: legado_max

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true

      # 单一 Gradle 调用：单次 daemon 内完成 assemble，KSP/Kotlin 增量复用。
      # 仅打包 arm64-v8a：减少 dex 合并和 native lib 打包时间。
      - name: Assemble Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleAppMaxDebug \
            -Pabi=arm64-v8a \
            -PVERSION_CODE="$(($(date -u +%s) / 60))" \
            --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: legado-max-debug-apk
          path: legado_max/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload build reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: |
            legado_max/app/build/reports
            legado_max/build/reports
          if-no-files-found: warn
          retention-days: 7
